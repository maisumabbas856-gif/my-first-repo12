<!DOCTYPE html>
<html>
<head>
    <title>Hostel Fee Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .total {
            font-weight: bold;
            background-color: #e8f5e9;
        }
    </style>
</head>
<body>

    <h1>Hostel Fee Structure</h1>

    <table>
        <tr>
            <th>Fee Type</th>
            <th>Amount (PKR)</th>
        </tr>
        <tr>
            <td>Admission Fee</td>
            <td>5,000</td>
        </tr>
        <tr>
            <td>Monthly Hostel Fee</td>
            <td>10,000</td>
        </tr>
        <tr>
            <td>Mess Charges</td>
            <td>4,000</td>
        </tr>
        <tr>
            <td>Security Deposit</td>
            <td>8,000</td>
        </tr>
        <tr class="total">
            <td>Total</td>
            <td>27,000</td>
        </tr>
    </table>

</body>
</html>
